<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitung Mundur Kelulusan</title>
    <!-- Tailwind CSS untuk styling yang responsif dan modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            /* Latar belakang animasi gradien hijau elegan */
            background: linear-gradient(-45deg, #022c22, #064e3b, #0f766e, #14532d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animasi fade in saat halaman dimuat */
        .fade-in {
            animation: fadeIn 1.5s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="min-h-screen text-white flex flex-col items-center justify-center px-4 overflow-hidden relative">

    <!-- Ornamen Lingkaran Cahaya (Background Decoration) -->
    <div class="absolute top-[-10%] left-[-10%] w-72 h-72 bg-emerald-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-teal-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse" style="animation-delay: 2s;"></div>

    <!-- Kontainer Utama -->
    <div class="z-10 max-w-4xl w-full text-center fade-in">
        
        <!-- Ikon Topi Toga (Opsional) -->
        <div class="flex justify-center mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 md:h-20 md:w-20 text-yellow-400 drop-shadow-lg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 14v7" />
            </svg>
        </div>

        <!-- Nama Sekolah -->
        <h2 class="text-xl md:text-2xl font-bold text-emerald-400 tracking-wider mb-2 drop-shadow-md">
            SMK MA'ARIF NU 1 AJIBARANG
        </h2>

        <h1 class="text-3xl md:text-5xl font-extrabold mb-4 tracking-tight drop-shadow-md">
            PENGUMUMAN KELULUSAN
        </h1>
        
        <p class="text-lg md:text-2xl font-light text-emerald-100 mb-8 md:mb-12 tracking-wide uppercase">
            Lulusan bisa diakses dalam
        </p>

        <!-- Kotak Hitung Mundur -->
        <div class="flex flex-wrap items-center justify-center gap-3 md:gap-6">
            
            <!-- HARI -->
            <div class="bg-white/10 backdrop-blur-md border border-white/20 shadow-2xl rounded-2xl p-4 md:p-6 w-20 md:w-32">
                <div id="days" class="text-3xl md:text-5xl lg:text-6xl font-bold tabular-nums">00</div>
                <div class="text-[10px] md:text-sm font-semibold tracking-widest text-emerald-200 mt-1 md:mt-2 uppercase">Hari</div>
            </div>

            <!-- Titik Dua -->
            <div class="hidden md:block text-3xl font-bold text-white/50 pb-6">:</div>

            <!-- JAM -->
            <div class="bg-white/10 backdrop-blur-md border border-white/20 shadow-2xl rounded-2xl p-4 md:p-6 w-20 md:w-32">
                <div id="hours" class="text-3xl md:text-5xl lg:text-6xl font-bold tabular-nums">00</div>
                <div class="text-[10px] md:text-sm font-semibold tracking-widest text-emerald-200 mt-1 md:mt-2 uppercase">Jam</div>
            </div>

            <!-- Titik Dua -->
            <div class="hidden md:block text-3xl font-bold text-white/50 pb-6">:</div>

            <!-- MENIT -->
            <div class="bg-white/10 backdrop-blur-md border border-white/20 shadow-2xl rounded-2xl p-4 md:p-6 w-20 md:w-32">
                <div id="minutes" class="text-3xl md:text-5xl lg:text-6xl font-bold tabular-nums">00</div>
                <div class="text-[10px] md:text-sm font-semibold tracking-widest text-emerald-200 mt-1 md:mt-2 uppercase">Menit</div>
            </div>

            <!-- Titik Dua -->
            <div class="hidden md:block text-3xl font-bold text-white/50 pb-6">:</div>

            <!-- DETIK -->
            <div class="bg-white/10 backdrop-blur-md border border-white/20 shadow-2xl rounded-2xl p-4 md:p-6 w-20 md:w-32">
                <div id="seconds" class="text-3xl md:text-5xl lg:text-6xl font-bold tabular-nums">00</div>
                <div class="text-[10px] md:text-sm font-semibold tracking-widest text-emerald-200 mt-1 md:mt-2 uppercase">Detik</div>
            </div>

        </div>

        <!-- Pesan Saat Waktu Habis (Tersembunyi secara default) -->
        <div id="expired-message" class="hidden mt-10 md:mt-12 bg-emerald-500/20 border border-emerald-400/50 text-emerald-300 rounded-xl py-4 px-6 inline-block backdrop-blur-md">
            <h2 class="text-xl md:text-3xl font-bold animate-pulse">PENGUMUMAN SUDAH BISA DIAKSES!</h2>
            <button class="mt-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-6 rounded-full transition duration-300 shadow-lg shadow-emerald-500/30 text-sm md:text-base">
                Cek Hasil Sekarang
            </button>
        </div>

    </div>

    <!-- Footer -->
    <div class="absolute bottom-6 w-full text-center text-xs md:text-sm text-emerald-300/60 z-10">
        &copy; 2026 SMK Ma'arif NU 1 Ajibarang. All rights reserved.
    </div>

    <!-- Script Hitung Mundur -->
    <script>
        // Mengatur waktu target ke 5 Mei 2026 (Format: Bulan Tanggal, Tahun Jam:Menit:Detik)
        // Kita atur ke tengah malam (00:00:00) tanggal 5 Mei 2026
        const countDownDate = new Date("May 5, 2026 00:00:00").getTime();

        // Fungsi untuk menambahkan angka 0 di depan jika angka < 10
        const padZero = (num) => num.toString().padStart(2, '0');

        function updateCountdown() {
            // Dapatkan waktu hari ini
            const now = new Date().getTime();

            // Hitung jarak antara sekarang dan tanggal kelulusan
            const distance = countDownDate - now;

            // Jika waktu sudah habis
            if (distance < 0) {
                clearInterval(timerInterval);
                document.getElementById("days").innerHTML = "00";
                document.getElementById("hours").innerHTML = "00";
                document.getElementById("minutes").innerHTML = "00";
                document.getElementById("seconds").innerHTML = "00";
                
                // Tampilkan pesan sukses dan sembunyikan kotak hitung mundur
                document.getElementById("expired-message").classList.remove("hidden");
                return;
            }

            // Perhitungan waktu untuk hari, jam, menit, dan detik
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Tampilkan hasil di elemen yang sesuai
            document.getElementById("days").innerHTML = padZero(days);
            document.getElementById("hours").innerHTML = padZero(hours);
            document.getElementById("minutes").innerHTML = padZero(minutes);
            document.getElementById("seconds").innerHTML = padZero(seconds);
        }

        // Jalankan fungsi sekali agar tidak ada delay kosong selama 1 detik
        updateCountdown();

        // Update hitung mundur setiap 1 detik
        const timerInterval = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
